<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Slate/Navy with a soft radial glow -->
  <rect width="512" height="512" rx="128" fill="#0F172A" />
  <circle cx="256" cy="256" r="200" fill="url(#bg_glow)" opacity="0.3" />

  <!-- Stylized Index Finger -->
  <g id="finger">
    <!-- Finger Base Body -->
    <path d="M256 460C210 460 180 420 180 370V160C180 110 214 70 256 70C298 70 332 110 332 160V370C332 420 302 460 256 460Z" fill="url(#skin_grad)" />
    
    <!-- Finger Nail Area -->
    <path d="M210 160C210 135 230 115 256 115C282 115 302 135 302 160V220H210V160Z" fill="url(#nail_grad)" opacity="0.8" />
    
    <!-- The Indelible Ink Stripe (The Voted Mark) -->
    <!-- Positioned across the nail and cuticle area -->
    <rect x="248" y="110" width="16" height="70" rx="8" fill="#4C1D95" filter="url(#ink_blur)" />
    <rect x="248" y="110" width="16" height="70" rx="8" fill="#6D28D9" />
  </g>

  <!-- Glossy Overlay for "Premium" feel -->
  <path d="M190 160C190 120 220 90 256 90" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.1" />

  <defs>
    <radialGradient id="bg_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" transform="translate(256 256) rotate(90) scale(200)">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#0F172A" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="skin_grad" x1="256" y1="70" x2="256" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD1A9" />
      <stop offset="1" stop-color="#E2A578" />
    </linearGradient>

    <linearGradient id="nail_grad" x1="256" y1="115" x2="256" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>

    <filter id="ink_blur" x="240" y="100" width="32" height="90" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="4" result="effect1_foregroundBlur_1"/>
    </filter>
  </defs>
</svg>
